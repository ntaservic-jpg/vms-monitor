<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPR Monitor - GitHub Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .live-indicator { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #camera-container { background: #000; position: relative; overflow: hidden; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-3xl shadow-sm border-b-4 border-blue-500">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">กล้องตรวจจับทะเบียนรถ</h1>
                <p class="text-sm text-gray-500 flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2 live-indicator"></span> 
                    สถานะ: เชื่อมต่อตรงผ่าน LAN
                </p>
            </div>
            <div id="clock" class="text-xl font-mono font-bold text-blue-600">--:--:--</div>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <div id="camera-container" class="rounded-3xl shadow-2xl border-4 border-white aspect-video">
                <img id="camera-live" 
                     src="https://via.placeholder.com/800x450?text=Waiting+for+Camera..." 
                     class="w-full h-full object-cover transition-opacity duration-300">
                
                <div class="absolute top-4 left-4 flex gap-2">
                    <span class="bg-red-600 text-white text-[10px] px-2 py-1 rounded font-bold uppercase tracking-widest">Live</span>
                    <span class="bg-black/50 text-white text-[10px] px-2 py-1 rounded backdrop-blur-md">192.168.55.100:8000</span>
                </div>

                <div class="absolute bottom-4 right-4 flex gap-2">
                    <button onclick="refreshImage()" class="bg-white/20 hover:bg-white/40 text-white p-3 rounded-full backdrop-blur-md transition-all">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100 flex flex-wrap justify-center gap-4">
                <div class="text-center px-8">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">ความถี่การรีเฟรช</p>
                    <select id="refresh-rate" class="bg-gray-50 border border-gray-200 rounded-lg px-3 py-1 text-sm outline-none">
                        <option value="200">0.2 วินาที (ลื่นมาก)</option>
<option value="500">0.5 วินาที (ปานกลาง)</option>
                        
                        <option value="1000">1 วินาที (เร็วที่สุด)</option>
                        <option value="3000" selected>3 วินาที (แนะนำ)</option>
                        <option value="5000">5 วินาที</option>
                    </select>
                </div>
                <div class="flex items-center">
                    <button id="btn-stream" onclick="toggleStreaming()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl font-bold transition-all shadow-md">
                        <i class="fas fa-play mr-2"></i> เริ่มดึงภาพสด
                    </button>
                </div>
            </div>
        </div>
        
        <div class="mt-6 text-center text-xs text-gray-400">
            <p>หมายเหตุ: หากภาพไม่ขึ้น โปรดตรวจสอบว่าคุณได้ Login เข้าหน้ากล้องใน Browser นี้แล้ว</p>
        </div>
    </div>

    <script>
    // --- ส่วนที่ปรับปรุงใหม่ ---
const CAM_IP = "192.168.55.100";
const CAM_PORT = "8000";
const CAM_PATH = "/cgi-bin/snap.cgi";

let streamInterval = null;
let isStreaming = false;

// 1. ฟังก์ชันนาฬิกา (คงเดิม)
setInterval(() => {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH');
}, 1000);

// 2. ฟังก์ชันดึงภาพแบบ High Frequency (ลื่นไหลเหมือนวิดีโอ)
function refreshImage() {
    const imgElement = document.getElementById('camera-live');
    const timestamp = new Date().getTime();
    const snapUrl = `http://${CAM_IP}:${CAM_PORT}${CAM_PATH}?ver=${timestamp}`;

    // เทคนิค Pre-loading: โหลดภาพในหน่วยความจำก่อนเปลี่ยนจริงเพื่อลดการกะพริบ
    const tempImg = new Image();
    tempImg.src = snapUrl;
    tempImg.onload = function() {
        imgElement.src = snapUrl;
    };
    
    tempImg.onerror = function() {
        console.error("การเชื่อมต่อล้มเหลว");
        if(isStreaming) stopStreaming();
        imgElement.src = "https://via.placeholder.com/800x450?text=Camera+Offline";
    };
}

// 3. ฟังก์ชันเปิด/ปิด ระบบสตรีมมิ่ง
function toggleStreaming() {
    const btn = document.getElementById('btn-stream');
    const rateSelect = document.getElementById('refresh-rate');

    if (!isStreaming) {
        isStreaming = true;
        // ปรับ UI ปุ่ม
        btn.innerHTML = '<i class="fas fa-stop mr-2"></i> หยุดสตรีมมิ่ง';
        btn.classList.replace('bg-blue-600', 'bg-red-600');
        
        // เริ่มดึงภาพตามความถี่ที่เลือก
        // ถ้าต้องการลื่นๆ ให้เลือก 1 วินาที หรือปรับในโค้ดเป็น 200-500ms
        const intervalTime = parseInt(rateSelect.value);
        streamInterval = setInterval(refreshImage, intervalTime);
        
        // เรียกทันทีหนึ่งครั้ง
        refreshImage();
    } else {
        stopStreaming();
    }
}

function stopStreaming() {
    const btn = document.getElementById('btn-stream');
    isStreaming = false;
    clearInterval(streamInterval);
    btn.innerHTML = '<i class="fas fa-play mr-2"></i> เริ่มดึงภาพสด';
    btn.classList.replace('bg-red-600', 'bg-blue-600');
}

    </script>
</body>
</html>
