<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPR Real-time Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; color: white; }
        .live-indicator { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #camera-container { background: #000; position: relative; overflow: hidden; border: 2px solid #334155; }
        .plate-badge { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6 bg-slate-800/50 p-6 rounded-3xl backdrop-blur-md border border-slate-700">
            <div>
                <h1 class="text-2xl font-bold text-white flex items-center">
                    <i class="fas fa-video-camera mr-3 text-blue-500"></i>
                    VMS & LPR REAL-TIME
                </h1>
                <p class="text-sm text-slate-400 flex items-center mt-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2 live-indicator"></span> 
                    กำลังแสดงผลต่อเนื่องอัตโนมัติ (10 FPS)
                </p>
            </div>
            <div id="clock" class="text-2xl font-mono font-bold text-blue-400 bg-slate-900 px-4 py-2 rounded-xl border border-slate-700">--:--:--</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-4">
                <div id="camera-container" class="rounded-3xl shadow-2xl aspect-video relative group">
                    <img id="camera-live" 
                         src="https://via.placeholder.com/800x450?text=Initializing+Stream..." 
                         class="w-full h-full object-cover">
                    
                    <div class="absolute top-4 left-4 flex gap-2">
                        <span class="bg-red-600 text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-widest shadow-lg">Live Stream</span>
                    </div>

                    <div class="absolute bottom-4 left-4 text-white/30 text-xs font-mono">
                        Source: 192.168.55.100:8000
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700 h-full">
                    <h2 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-4">ข้อมูลตรวจจับล่าสุด</h2>
                    
                    <div class="plate-badge p-4 rounded-2xl mb-4">
                        <p class="text-slate-500 text-[10px] mb-1">เลขทะเบียน</p>
                        <div id="last-plate" class="text-3xl font-bold text-white tracking-tight">- - - -</div>
                    </div>

                    <div class="plate-badge p-4 rounded-2xl mb-6">
                        <p class="text-slate-500 text-[10px] mb-1">จังหวัด</p>
                        <div id="last-province" class="text-xl font-bold text-blue-200">-</div>
                    </div>

                    <div class="text-center">
                        <p class="text-[10px] text-slate-500 mb-2">เครือข่ายความเร็วสูง</p>
                        <div class="w-full bg-slate-700 h-1 rounded-full overflow-hidden">
                            <div class="bg-blue-500 h-full w-full live-indicator"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-8 flex justify-center gap-4">
             <button onclick="location.reload()" class="text-slate-500 hover:text-white text-xs transition-colors">
                <i class="fas fa-redo mr-1"></i> รีโหลดหน้าเว็บหากภาพค้าง
             </button>
        </div>
    </div>

    <script>
        const CAM_IP = "192.168.55.100";
        const CAM_PORT = "8000";
        const CAM_PATH = "/cgi-bin/snap.cgi";
        const REFRESH_MS = 100; // 0.1 วินาที
        
        // --- 1. ระบบดึงภาพสด (รันอัตโนมัติ) ---
        function startLiveStream() {
            const imgElement = document.getElementById('camera-live');
            
            setInterval(() => {
                const timestamp = new Date().getTime();
                const snapUrl = `http://${CAM_IP}:${CAM_PORT}${CAM_PATH}?v=${timestamp}`;

                // Double Buffering Technique
                const buffer = new Image();
                buffer.src = snapUrl;
                buffer.onload = () => {
                    imgElement.src = snapUrl;
                };
            }, REFRESH_MS);
        }

        // --- 2. ระบบดึงข้อมูลทะเบียนจาก Google Sheets (ทุก 2 วินาที) ---
        // คุณต้องเอา URL จาก 'Deploy as Web App' ของ Google มาใส่ตรงนี้
        const GOOGLE_SCRIPT_URL = "ใส่_URL_GOOGLE_APPS_SCRIPT_ของคุณตรงนี้";

        function updateLPRData() {
            if (GOOGLE_SCRIPT_URL === "ใส่_URL_GOOGLE_APPS_SCRIPT_ของคุณตรงนี้") return;

            fetch(GOOGLE_SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    if (data && data.plate) {
                        document.getElementById('last-plate').innerText = data.plate;
                        document.getElementById('last-province').innerText = data.province;
                    }
                })
                .catch(err => console.log("กำลังรอข้อมูลทะเบียน..."));
        }

        // --- 3. เริ่มการทำงานทั้งหมด ---
        window.onload = () => {
            console.log("Starting Auto-Monitor...");
            startLiveStream();
            setInterval(updateLPRData, 2000); // เช็คทะเบียนใหม่ทุก 2 วินาที
            
            // นาฬิกา
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH');
            }, 1000);
        };
    </script>
</body>
</html>
